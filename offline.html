<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <meta name="description" content="Master vocabulary with adaptive quizzes and spaced repetition">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="VocaVera">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="apple-touch-startup-image" href="icons/icon-512x512.png">

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://cdn.sheetjs.com">

    <title>VocaVera - Vocabulary Builder</title>

    <!-- Existing CSS will be injected here -->
</head>
<body>
    <!-- App will be mounted here -->
    <div id="app"></div>

    <!-- Install Prompt Banner -->
    <div id="installBanner" class="install-banner hidden" style="...">
        <!-- Content will be injected by JS -->
    </div>

    <!-- Offline Indicator -->
    <div id="offlineIndicator" class="offline-indicator hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18.364 5.636a9 9 0 0 1-12.728 0M12 2v2m-4.364 4.364l2.12 2.12M6.364 17.364a9 9 0 0 1 12.728 0M22 12h-2m-4.364-4.364l-2.12-2.12"/>
        </svg>
        <span>Offline</span>
    </div>

    <!-- Sync Indicator -->
    <div id="syncIndicator" class="sync-indicator hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        <span>Syncing...</span>
    </div>

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('[App] Service Worker registered:', reg.scope);

                    // Check for updates
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        console.log('[App] New service worker found');
                    });

                    reg.addEventListener('statechange', () => {
                        if (reg.state === 'activated') {
                            console.log('[App] Service Worker activated');
                        }
                    });
                })
                .catch(err => console.error('[App] SW registration failed:', err));
        }

        // Install Prompt Logic
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;

            // Show install banner after user engagement (2-3 sessions)
            if (getEngagementScore() >= 2) {
                showInstallBanner();
            }
        });

        window.addEventListener('appinstalled', () => {
            console.log('[App] PWA installed');
            deferredPrompt = null;
            hideInstallBanner();
            // Track install event
            if (window.gtag) {
                gtag('event', 'pwa_install', { method: 'banner' });
            }
        });

        function showInstallBanner() {
            if (installBanner) {
                installBanner.classList.remove('hidden');
                installBanner.style.animation = 'slideUp 300ms ease';
            }
        }

        function hideInstallBanner() {
            if (installBanner) {
                installBanner.classList.add('hidden');
            }
        }

        // Install button click
        document.addEventListener('click', (e) => {
            if (e.target.closest('#installBanner')) {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choice) => {
                        if (choice.outcome === 'accepted') {
                            console.log('[App] User accepted install');
                        }
                        deferredPrompt = null;
                        hideInstallBanner();
                    });
                }
            }
        });

        // Engagement tracking for install prompt
        function getEngagementScore() {
            const sessions = parseInt(localStorage.getItem('vocavera_sessions') || '0');
            const quizCompleted = parseInt(localStorage.getItem('vocavera_quizzes') || '0');
            return sessions + quizCompleted;
        }

        function trackSession() {
            const sessions = parseInt(localStorage.getItem('vocavera_sessions') || '0');
            localStorage.setItem('vocavera_sessions', (sessions + 1).toString());
        }

        // Call on app load
        trackSession();

        // Offline/Online detection
        function updateOnlineStatus() {
            const indicator = document.getElementById('offlineIndicator');
            if (indicator) {
                if (!navigator.onLine) {
                    indicator.classList.remove('hidden');
                } else {
                    indicator.classList.add('hidden');
                }
            }
        }

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // Background Sync Registration
        function registerBackgroundSync(tag) {
            if ('serviceWorker' in navigator && 'SyncManager' in window) {
                navigator.serviceWorker.ready.then(registration => {
                    return registration.sync.register(tag);
                }).catch(err => {
                    console.error('[App] Background sync failed:', err);
                });
            }
        }

        // Expose to window for use in app
        window.VocaVeraPWA = {
            registerSync: registerBackgroundSync,
            isOnline: () => navigator.onLine,
            getEngagement: getEngagementScore
        };
    </script>

    <style>
        /* PWA-specific styles */
        .install-banner {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            color: white;
            padding: 16px 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.3);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .install-banner.hidden {
            display: none;
        }

        .install-banner-text {
            font-size: 14px;
            font-weight: 500;
        }

        .install-banner-btn {
            background: white;
            color: #4F46E5;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }

        .install-banner-close {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .offline-indicator {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #EF4444;
            color: white;
            padding: 8px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .offline-indicator.hidden {
            display: none;
        }

        .sync-indicator {
            position: fixed;
            bottom: 80px;
            right: 16px;
            background: #10B981;
            color: white;
            padding: 8px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            z-index: 9998;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .sync-indicator.hidden {
            display: none;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .sync-indicator svg {
            animation: spin 1s linear infinite;
        }

        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-card {
            height: 100px;
            border-radius: 16px;
            margin-bottom: 12px;
        }

        .skeleton-text {
            height: 14px;
            margin-bottom: 8px;
            width: 80%;
        }

        .skeleton-text.short {
            width: 40%;
        }
    </style>
</body>
</html>
